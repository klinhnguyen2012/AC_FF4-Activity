<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ami Connect - Back Together Activity Deck</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts for Kids-Friendly Rounded Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background-color: #f0f2f5;
    }
    h1, h2, h3, .font-display {
      font-family: 'Fredoka', sans-serif;
    }
    /* Notebook Paper Background Effect matching style in image_9bb504.jpg */
    .notebook-paper {
      background-color: #FFFDF0;
      background-image: linear-gradient(#e8e5c7 1px, transparent 1px);
      background-size: 100% 2.5rem;
      position: relative;
    }
    .notebook-paper::before {
      content: '';
      position: absolute;
      top: 0;
      left: 3rem;
      width: 2px;
      height: 100%;
      background-color: #ffb3c1;
    }
    /* Simple slide shadow & aspect ratio lock (16:9) */
    .slide-aspect-ratio {
      aspect-ratio: 16 / 9;
    }
    /* Draw Canvas overlay styling */
    #drawing-canvas {
      pointer-events: none;
    }
    #drawing-canvas.drawing-active {
      pointer-events: auto;
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%23ff3366" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>') 0 20, auto;
    }
    /* Soft button bounce */
    .btn-bounce:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body class="h-screen flex flex-col justify-between overflow-hidden select-none">

  <!-- Toast Notification Panel -->
  <div id="toast-container" class="fixed top-20 right-6 z-50 flex flex-col space-y-2 pointer-events-none"></div>

  <!-- Top Navigation Header / Teacher Console -->
  <header class="bg-white shadow-sm px-6 py-3 flex items-center justify-between z-10">
    <div class="flex items-center space-x-4">
      <div class="flex items-center space-x-2">
        <span class="w-3 h-3 bg-red-500 rounded-full animate-ping"></span>
        <span class="font-bold text-gray-800 text-sm tracking-wide font-display">LIVE CLASSROOM DECK</span>
      </div>
      <div class="h-4 w-px bg-gray-300"></div>
      <div class="text-sm text-gray-500">
        Topic: <span class="font-bold text-navy-800">Starter - Back Together!</span>
      </div>
    </div>

    <!-- Active Presentation Controls -->
    <div class="flex items-center space-x-3">
      <!-- Draw Tool Button -->
      <button id="btn-draw" class="btn-bounce flex items-center space-x-2 bg-slate-100 hover:bg-pink-100 hover:text-pink-600 px-4 py-2 rounded-full text-slate-700 font-bold transition-all text-sm border border-slate-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
        </svg>
        <span>Board Pen</span>
      </button>

      <!-- Clear Drawings Button -->
      <button id="btn-clear-draw" class="btn-bounce flex items-center space-x-2 bg-slate-100 hover:bg-slate-200 px-3 py-2 rounded-full text-slate-500 hover:text-slate-800 transition-all text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
        <span>Clear Ink</span>
      </button>

      <div class="h-4 w-px bg-gray-300"></div>

      <!-- Present Mode / Fullscreen -->
      <button onclick="toggleFullscreen()" class="btn-bounce flex items-center space-x-2 bg-sky-500 hover:bg-sky-600 text-white px-4 py-2 rounded-full font-bold transition-all text-sm shadow-md shadow-sky-100">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5v-4m0 4h-4m4 0l-5-5" />
        </svg>
        <span>Fullscreen</span>
      </button>
    </div>
  </header>

  <!-- Main Slide Viewer Area -->
  <main class="flex-grow flex items-center justify-center p-6 relative">
    
    <!-- Left Navigation Button -->
    <button onclick="prevSlide()" class="btn-bounce absolute left-4 bg-white hover:bg-amber-100 text-slate-700 hover:text-amber-700 p-4 rounded-full shadow-lg border border-slate-200 transition-all z-20">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
    </button>

    <!-- Slide Container (Self-Contained Aspect Ratio 16:9 Slide Deck) -->
    <div id="slide-viewport" class="slide-aspect-ratio w-full max-w-5xl bg-white rounded-3xl shadow-2xl border-8 border-yellow-300 overflow-hidden relative flex flex-col justify-between notebook-paper select-none transition-all duration-300">
      
      <!-- Vector canvas overlay for drawing annotations dynamically -->
      <canvas id="drawing-canvas" class="absolute inset-0 w-full h-full z-30"></canvas>

      <!-- Active Slide Content Injection Point -->
      <div id="slide-content-root" class="w-full h-full p-12 flex flex-col justify-between relative z-10">
        <!-- Content will be rendered dynamically by JavaScript -->
      </div>

    </div>

    <!-- Right Navigation Button -->
    <button onclick="nextSlide()" class="btn-bounce absolute right-4 bg-white hover:bg-amber-100 text-slate-700 hover:text-amber-700 p-4 rounded-full shadow-lg border border-slate-200 transition-all z-20">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
      </svg>
    </button>
  </main>

  <!-- Bottom Navigation Carousel Strip (Simulating the Slides Layout Strip) -->
  <footer class="bg-slate-900 text-white p-4 flex flex-col space-y-2 z-10">
    <div class="flex items-center justify-between text-xs px-2 text-slate-400">
      <span>SLIDE THUMBNAILS (CLICK TO JUMP)</span>
      <span id="slide-counter-badge">Slide 1 of 5</span>
    </div>
    
    <div class="flex space-x-3 overflow-x-auto pb-1 px-1 scrollbar-thin scrollbar-thumb-slate-700">
      <!-- Rendered thumbnail buttons -->
      <div id="thumbnail-strip" class="flex space-x-3"></div>
    </div>
  </footer>

  <!-- JS Presentation Engine -->
  <script>
    // --- SLIDES DATABASE ---
    const slidesData = [
      {
        id: 1,
        type: "cover",
        title: "STARTER: BACK TOGETHER",
        subtitle: "Let's Play Three Fun Games!",
        badge: "Lesson 1 & 2",
        theme: "yellow"
      },
      {
        id: 2,
        type: "game1",
        title: "GAME 1: REARRANGE THE LETTERS",
        subtitle: "Unscramble the letters to find the hobby word!",
        items: [
          { scrambled: "Y S T O", answer: "TOYS", icon: "🧸", searchHint: "teddy bear" },
          { scrambled: "S U M I C", answer: "MUSIC", icon: "🎵", searchHint: "music notes" },
          { scrambled: "O S T P H O", answer: "PHOTOS", icon: "📷", searchHint: "camera" },
          { scrambled: "O B K O S", answer: "BOOKS", icon: "📚", searchHint: "books stack" }
        ],
        revealed: [false, false, false, false]
      },
      {
        id: 3,
        type: "game2",
        title: "GAME 2: WRITE THE SENTENCES",
        subtitle: "Read the prompts and use can or can't! Click lines to reveal.",
        prompts: [
          { prompt: "I / play computer games / 😢", answer: "I can't play computer games.", isCan: false, icon: "💻" },
          { prompt: "We / listen to music / 😊", answer: "We can listen to music.", isCan: true, icon: "🎧" },
          { prompt: "You / watch a DVD / 😊", answer: "You can watch a DVD.", isCan: true, icon: "💿" }
        ],
        revealed: [false, false, false]
      },
      {
        id: 4,
        type: "game3",
        title: "GAME 3: CHOOSE 'A' OR 'SOME'?",
        subtitle: "Click the food items to put a or some into the sentences!",
        foods: [
          { text: "I'd like [ a / some ] pasta, please.", correct: "some", display: "I'd like <span class='text-red-500 font-extrabold bg-red-50 px-2 rounded-lg border-2 border-dashed border-red-300'>some</span> pasta, please.", type: "Uncountable", icon: "🍝", label: "pasta" },
          { text: "I'd like [ a / some ] lemon, please.", correct: "a", display: "I'd like <span class='text-emerald-600 font-extrabold bg-emerald-50 px-2 rounded-lg border-2 border-dashed border-emerald-300'>a</span> lemon, please.", type: "Countable", icon: "🍋", label: "lemon" },
          { text: "I'd like [ a / some ] cheese, please.", correct: "some", display: "I'd like <span class='text-red-500 font-extrabold bg-red-50 px-2 rounded-lg border-2 border-dashed border-red-300'>some</span> cheese, please.", type: "Uncountable", icon: "🧀", label: "cheese" },
          { text: "I'd like [ a / some ] melon, please.", correct: "a", display: "I'd like <span class='text-emerald-600 font-extrabold bg-emerald-50 px-2 rounded-lg border-2 border-dashed border-emerald-300'>a</span> melon, please.", type: "Countable", icon: "🍈", label: "melon" }
        ],
        revealed: [false, false, false, false]
      },
      {
        id: 5,
        type: "congrats",
        title: "WELL DONE!",
        subtitle: "Fantastic English today, superstars!",
        badge: "Lesson Finished"
      }
    ];

    let currentSlideIndex = 0;

    // --- AMI CONNECT LOGO COMPONENT (SVG) ---
    // Refers directly to style parameters matching image_9bb7ca.png
    const amiLogoSVG = `
      <div class="flex flex-col items-end">
        <svg class="h-10 w-auto" viewBox="0 0 250 80" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Stylized 'A' in Dark Navy -->
          <path d="M40 70 L60 20 L80 70 Z" stroke="#122A47" stroke-width="12" stroke-linejoin="miter"/>
          <!-- Red swoosh over the A -->
          <path d="M10 55 Q75 10 135 48" stroke="#E53E3E" stroke-width="10" stroke-linecap="round" fill="none"/>
          <!-- text "mi" -->
          <text x="88" y="65" font-family="'Fredoka', sans-serif" font-weight="800" font-size="44" fill="#122A47">mi</text>
          <!-- Shiny star instead of i-dot -->
          <path d="M118 15 L121 21 L128 22 L123 27 L124 34 L118 30 L112 34 L113 27 L108 22 L115 21 Z" fill="#3FA9F5" />
          <!-- Subtitle "Connect" -->
          <text x="60" y="81" font-family="'Quicksand', sans-serif" font-weight="700" font-size="16" fill="#122A47" letter-spacing="1">Connect</text>
        </svg>
      </div>
    `;

    // --- TOAST NOTIFICATION HANDLER (Safe alternative to alert) ---
    function showNotification(message, type = 'info') {
      const container = document.getElementById("toast-container");
      if (!container) return;

      const toast = document.createElement("div");
      toast.className = `transform translate-y-2 opacity-0 transition-all duration-300 ease-out flex items-center space-x-2 px-4 py-3 rounded-xl shadow-lg border text-sm font-bold pointer-events-auto ${
        type === 'error' 
          ? 'bg-red-50 border-red-200 text-red-800' 
          : 'bg-emerald-50 border-emerald-200 text-emerald-800'
      }`;
      
      toast.innerHTML = `
        <span class="text-base">${type === 'error' ? '⚠️' : '✨'}</span>
        <span>${message}</span>
      `;
      
      container.appendChild(toast);
      
      // Request animation frame for smooth slide-in entry
      requestAnimationFrame(() => {
        toast.classList.remove('translate-y-2', 'opacity-0');
      });

      // Automatically strip down toast after 3 seconds
      setTimeout(() => {
        toast.classList.add('translate-y-2', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // --- DRAWING CANVAS CONTROLLERS ---
    const canvas = document.getElementById("drawing-canvas");
    const ctx = canvas.getContext("2d");
    let isDrawingActive = false;
    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;

    // Drawing coordinates mapping inside 16:9 canvas (Includes Division safety checks)
    function getCanvasCoordinates(e) {
      const rect = canvas.getBoundingClientRect();
      const rectWidth = rect.width || 1;
      const rectHeight = rect.height || 1;
      const scaleX = canvas.width / rectWidth;
      const scaleY = canvas.height / rectHeight;
      
      let clientX = e.clientX;
      let clientY = e.clientY;
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      }
      
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function initCanvas() {
      const viewport = document.getElementById("slide-viewport");
      if (!viewport) return;
      
      // Set width & height with dynamic fallback values
      canvas.width = viewport.clientWidth || 1024;
      canvas.height = viewport.clientHeight || 576;
      
      ctx.lineWidth = 5;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#ff3366"; // Playful bright color
    }

    function startDrawing(e) {
      if (!isDrawingActive) return;
      isDrawing = true;
      const coords = getCanvasCoordinates(e);
      lastX = coords.x;
      lastY = coords.y;
    }

    function draw(e) {
      if (!isDrawing) return;
      e.preventDefault();
      const coords = getCanvasCoordinates(e);
      
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(coords.x, coords.y);
      ctx.stroke();
      
      lastX = coords.x;
      lastY = coords.y;
    }

    function stopDrawing() {
      isDrawing = false;
    }

    // Toggle button handler
    const btnDraw = document.getElementById("btn-draw");
    const btnClear = document.getElementById("btn-clear-draw");

    btnDraw.addEventListener("click", () => {
      isDrawingActive = !isDrawingActive;
      if (isDrawingActive) {
        canvas.classList.add("drawing-active");
        btnDraw.classList.remove("bg-slate-100", "text-slate-700");
        btnDraw.classList.add("bg-pink-500", "text-white");
        showNotification("Board Pen activated! Draw anywhere on the slides.", "info");
      } else {
        canvas.classList.remove("drawing-active");
        btnDraw.classList.remove("bg-pink-500", "text-white");
        btnDraw.classList.add("bg-slate-100", "text-slate-700");
        showNotification("Board Pen disabled.", "info");
      }
    });

    btnClear.addEventListener("click", () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      showNotification("Canvas ink cleared successfully!", "info");
    });

    // Mouse events
    canvas.addEventListener("mousedown", startDrawing);
    canvas.addEventListener("mousemove", draw);
    canvas.addEventListener("mouseup", stopDrawing);
    canvas.addEventListener("mouseleave", stopDrawing);

    // Touch support for Drawing Canvas
    canvas.addEventListener("touchstart", (e) => {
      startDrawing(e);
    });
    canvas.addEventListener("touchmove", (e) => {
      draw(e);
    }, { passive: false });
    canvas.addEventListener("touchend", stopDrawing);

    // Handle Resize cleanly
    window.addEventListener("resize", () => {
      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      const tempCtx = tempCanvas.getContext("2d");
      tempCtx.drawImage(canvas, 0, 0);

      initCanvas();
      ctx.drawImage(tempCanvas, 0, 0, canvas.width, canvas.height);
    });

    // --- REVEAL MECHANICS ---
    function revealGame1Answer(itemIndex) {
      if (isDrawingActive) return; // Prioritize board pen clicks
      slidesData[currentSlideIndex].revealed[itemIndex] = true;
      renderCurrentSlide();
    }

    function revealGame2Answer(promptIndex) {
      if (isDrawingActive) return; // Prioritize board pen clicks
      slidesData[currentSlideIndex].revealed[promptIndex] = true;
      renderCurrentSlide();
    }

    function selectGame3Choice(foodIndex, choiceSelected) {
      if (isDrawingActive) return; // Prioritize board pen clicks
      slidesData[currentSlideIndex].revealed[foodIndex] = choiceSelected;
      renderCurrentSlide();
    }

    function revealAllOnSlide() {
      const slide = slidesData[currentSlideIndex];
      if (slide.type === 'game1' || slide.type === 'game2') {
        slide.revealed = slide.revealed.map(() => true);
      } else if (slide.type === 'game3') {
        slide.revealed = slide.foods.map(f => f.correct);
      }
      renderCurrentSlide();
      showNotification("All hidden answers revealed!", "info");
    }

    // --- VIEWPORT INJECTION RENDERERS ---
    function renderCurrentSlide() {
      const slide = slidesData[currentSlideIndex];
      const root = document.getElementById("slide-content-root");
      if (!root) return;
      
      // Update Slide Counter Status Banner
      document.getElementById("slide-counter-badge").textContent = `Slide ${currentSlideIndex + 1} of ${slidesData.length}`;

      // Re-compile basic notebook structures on slide change
      if (slide.type === "cover") {
        root.innerHTML = `
          <!-- Header Margins with Logo -->
          <div class="flex justify-between items-start w-full">
            <span class="bg-amber-100 border border-amber-300 text-amber-800 px-4 py-1.5 rounded-full text-sm font-bold font-display uppercase tracking-wider shadow-sm animate-pulse">
              🌟 ${slide.badge}
            </span>
            ${amiLogoSVG}
          </div>

          <!-- Main Creative Slide Elements -->
          <div class="flex-grow flex items-center justify-between mt-6 w-full">
            
            <!-- Left Element (3D Pencil Lightbulb) -->
            <div class="w-1/2 flex justify-center items-center relative">
              <div class="relative w-64 h-64 bg-yellow-100 rounded-full flex items-center justify-center border-4 border-dashed border-yellow-300 animate-bounce duration-3000">
                <div class="text-[120px] filter drop-shadow-xl select-none leading-none">💡</div>
                <div class="absolute bottom-4 right-10 text-5xl transform rotate-12 drop-shadow-md">✏️</div>
              </div>
            </div>

            <!-- Right Elements (Titles Block) -->
            <div class="w-1/2 flex flex-col items-start space-y-4">
              <span class="text-orange-500 font-extrabold text-2xl tracking-widest font-display">ACTIVITY:</span>
              <h1 class="text-5xl font-extrabold text-slate-800 leading-tight tracking-wide font-display">
                STARTER: <br/>
                <span class="text-sky-500 underline decoration-yellow-400 decoration-wavy">BACK TOGETHER!</span>
              </h1>
              <p class="text-slate-500 text-lg font-bold">Ami Connect Interactive Classroom Games</p>
            </div>
          </div>

          <!-- Decorative Footer Rings on notebook margin -->
          <div class="absolute left-1 top-1/4 flex flex-col space-y-8">
            <div class="w-4 h-4 bg-slate-300 rounded-full shadow-inner border border-slate-400"></div>
            <div class="w-4 h-4 bg-slate-300 rounded-full shadow-inner border border-slate-400"></div>
            <div class="w-4 h-4 bg-slate-300 rounded-full shadow-inner border border-slate-400"></div>
            <div class="w-4 h-4 bg-slate-300 rounded-full shadow-inner border border-slate-400"></div>
          </div>
        `;
      } 
      
      else if (slide.type === "game1") {
        let itemsHtml = "";
        slide.items.forEach((item, index) => {
          const isRev = slide.revealed[index];
          itemsHtml += `
            <div onclick="revealGame1Answer(${index})" class="group cursor-pointer flex items-center justify-between bg-white/80 hover:bg-yellow-50/90 hover:scale-[1.02] active:scale-95 border-2 ${isRev ? 'border-emerald-400 bg-emerald-50/50' : 'border-slate-200'} rounded-2xl p-4 transition-all shadow-md">
              <div class="flex items-center space-x-6">
                <!-- Word Scramble Block -->
                <div class="flex space-x-2">
                  ${item.scrambled.split(' ').map(l => `<span class="bg-slate-100 border border-slate-300 text-slate-700 font-extrabold text-lg px-3 py-1.5 rounded-lg shadow-sm">${l}</span>`).join('')}
                </div>
                
                <!-- Arrow -->
                <span class="text-2xl text-slate-400 group-hover:text-amber-500 transition-colors">👉</span>
                
                <!-- Answer Reveal Block -->
                <div class="min-w-[120px] flex items-center">
                  ${isRev 
                    ? `<span class="text-emerald-600 font-extrabold text-2xl tracking-widest font-display animate-bounce">${item.answer}</span>`
                    : `<span class="text-slate-300 text-sm italic font-semibold border-b-2 border-dashed border-slate-300 px-4 py-1">Click to Unscramble</span>`
                  }
                </div>
              </div>

              <!-- Sticker Element -->
              <div class="flex items-center space-x-2">
                <span class="text-4xl filter drop-shadow">${item.icon}</span>
                ${isRev ? `<span class="text-2xl text-emerald-500">✅</span>` : ''}
              </div>
            </div>
          `;
        });

        root.innerHTML = `
          <div class="flex justify-between items-start w-full">
            <div class="flex flex-col">
              <span class="bg-orange-100 text-orange-800 px-4 py-1.5 rounded-full text-sm font-bold font-display uppercase tracking-wide inline-block w-fit shadow-sm">
                🎯 GAME 1: REARRANGE THE LETTERS
              </span>
              <p class="text-slate-500 text-sm mt-1 font-bold">Unscramble our hobby nouns! Click each word card to check.</p>
            </div>
            <button onclick="revealAllOnSlide()" class="btn-bounce bg-amber-500 hover:bg-amber-600 text-white font-bold text-sm px-4 py-2 rounded-xl shadow-md">
              Reveal All
            </button>
          </div>

          <!-- Main Layout -->
          <div class="grid grid-cols-2 gap-4 mt-4 flex-grow">
            ${itemsHtml}
          </div>
        `;
      } 
      
      else if (slide.type === "game2") {
        let promptsHtml = "";
        slide.prompts.forEach((item, index) => {
          const isRev = slide.revealed[index];
          promptsHtml += `
            <div onclick="revealGame2Answer(${index})" class="cursor-pointer group flex items-center justify-between p-4 rounded-2xl border-2 ${isRev ? 'border-sky-400 bg-sky-50/50' : 'border-slate-200 bg-white/70'} hover:scale-[1.01] hover:bg-sky-50/30 transition-all shadow-sm">
              <div class="flex items-center space-x-4 w-1/2">
                <span class="text-3xl">${item.icon}</span>
                <span class="font-bold text-lg text-slate-700 tracking-wide">${item.prompt}</span>
              </div>
              
              <div class="w-1/2 flex items-center justify-between pl-6 border-l-2 border-dashed border-slate-200">
                <div class="flex-grow">
                  ${isRev 
                    ? `<span class="text-slate-800 font-extrabold text-xl font-display text-sky-600">${item.answer}</span>`
                    : `<div class="h-8 w-11/12 border-b-2 border-dashed border-slate-300 flex items-center text-slate-300 italic text-sm">Click to reveal answer...</div>`
                  }
                </div>
                <div>
                  ${isRev 
                    ? (item.isCan ? '<span class="text-3xl">😊</span>' : '<span class="text-3xl">😢</span>') 
                    : '<span class="text-2xl text-slate-300">❓</span>'
                  }
                </div>
              </div>
            </div>
          `;
        });

        root.innerHTML = `
          <div class="flex justify-between items-start w-full">
            <div class="flex flex-col">
              <span class="bg-sky-100 text-sky-800 px-4 py-1.5 rounded-full text-sm font-bold font-display uppercase tracking-wide inline-block w-fit shadow-sm">
                ⚡ GAME 2: WRITE THE SENTENCES (CAN / CAN'T)
              </span>
              <p class="text-slate-500 text-sm mt-1 font-bold">Use the clues (😊 for can, 😢 for can't) to write complete answers!</p>
            </div>
            <button onclick="revealAllOnSlide()" class="btn-bounce bg-amber-500 hover:bg-amber-600 text-white font-bold text-sm px-4 py-2 rounded-xl shadow-md">
              Reveal All
            </button>
          </div>

          <div class="flex flex-col space-y-3 mt-4 flex-grow justify-center">
            ${promptsHtml}
          </div>
        `;
      } 
      
      else if (slide.type === "game3") {
        let foodsHtml = "";
        slide.foods.forEach((food, idx) => {
          const userChoice = slide.revealed[idx]; // false, 'a', or 'some'
          const isCorrect = userChoice === food.correct;
          
          foodsHtml += `
            <div class="bg-white/90 border-2 border-slate-200 rounded-2xl p-4 shadow-sm flex items-center justify-between">
              <div class="flex items-center space-x-4 w-2/3">
                <span class="text-4xl filter drop-shadow">${food.icon}</span>
                <div class="flex flex-col">
                  <!-- Sentence Display -->
                  <p class="font-bold text-lg text-slate-800">
                    ${userChoice ? food.display : food.text}
                  </p>
                  <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">${food.label} (${food.type})</span>
                </div>
              </div>

              <!-- Answer Select Buttons -->
              <div class="flex items-center space-x-2">
                <button onclick="selectGame3Choice(${idx}, 'a')" class="btn-bounce px-3 py-1.5 rounded-lg text-sm font-black transition-all ${userChoice === 'a' ? (food.correct === 'a' ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white') : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}">
                  A
                </button>
                <button onclick="selectGame3Choice(${idx}, 'some')" class="btn-bounce px-3 py-1.5 rounded-lg text-sm font-black transition-all ${userChoice === 'some' ? (food.correct === 'some' ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white') : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}">
                  SOME
                </button>
                <div class="w-8 flex justify-center">
                  ${userChoice ? (isCorrect ? '<span class="text-2xl animate-bounce">✅</span>' : '<span class="text-2xl">❌</span>') : ''}
                </div>
              </div>
            </div>
          `;
        });

        root.innerHTML = `
          <div class="flex justify-between items-start w-full">
            <div class="flex flex-col">
              <span class="bg-pink-100 text-pink-800 px-4 py-1.5 rounded-full text-sm font-bold font-display uppercase tracking-wide inline-block w-fit shadow-sm">
                🍒 GAME 3: CHOOSE 'A' OR 'SOME'
              </span>
              <p class="text-slate-500 text-sm mt-1 font-bold">Decide if each food takes "a" or "some"! Think about Countable vs Uncountable.</p>
            </div>
            <button onclick="revealAllOnSlide()" class="btn-bounce bg-amber-500 hover:bg-amber-600 text-white font-bold text-sm px-4 py-2 rounded-xl shadow-md">
              Reveal Answers
            </button>
          </div>

          <div class="grid grid-cols-2 gap-4 mt-4 flex-grow">
            ${foodsHtml}
          </div>
        `;
      } 
      
      else if (slide.type === "congrats") {
        root.innerHTML = `
          <div class="flex justify-end w-full">
            ${amiLogoSVG}
          </div>

          <!-- Trophy Graphic and Text Alignment -->
          <div class="flex-grow flex flex-col items-center justify-center text-center space-y-6">
            <!-- Awesome CSS Animated Trophy Sticker -->
            <div class="relative">
              <div class="text-[140px] animate-bounce filter drop-shadow-2xl">🏆</div>
              <div class="absolute -top-4 -left-4 text-4xl animate-pulse">⭐</div>
              <div class="absolute -bottom-4 -right-4 text-4xl animate-pulse delay-500">⭐</div>
            </div>

            <div class="space-y-2">
              <h1 class="text-6xl font-extrabold text-navy-800 tracking-wide font-display">
                <span class="text-orange-500">THANK</span> YOU!
              </h1>
              <p class="text-2xl text-sky-500 font-extrabold font-display">GREAT JOB TODAY, SUPERSTARS!</p>
            </div>
            
            <p class="text-slate-400 font-bold max-w-md">You're fully ready for Unit 1. Keep practicing your spelling and sentence structures!</p>
          </div>
        `;
      }

      // Re-initialize thumbnails selection highlight
      renderThumbnails();
    }

    // --- BOTTOM THUMBNAILS CAROUSEL GENERATOR ---
    function renderThumbnails() {
      const container = document.getElementById("thumbnail-strip");
      if (!container) return;
      container.innerHTML = "";

      slidesData.forEach((slide, idx) => {
        let titleText = slide.title;
        if(slide.type === "cover") titleText = "Cover Page";
        if(slide.type === "congrats") titleText = "Ending Page";
        
        const isActive = idx === currentSlideIndex;
        
        container.innerHTML += `
          <button onclick="jumpToSlide(${idx})" class="flex-shrink-0 w-44 h-24 rounded-lg overflow-hidden border-4 ${isActive ? 'border-yellow-400 scale-95 ring-2 ring-yellow-400' : 'border-slate-700 hover:border-slate-500'} bg-slate-800 p-2 flex flex-col justify-between text-left transition-all">
            <span class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Slide ${idx + 1}</span>
            <span class="text-xs text-white font-extrabold truncate w-full font-display">${titleText}</span>
            <div class="h-1 w-full bg-slate-700 rounded-full mt-2 overflow-hidden">
              <div class="h-full bg-amber-400" style="width: ${((idx+1)/slidesData.length)*100}%"></div>
            </div>
          </button>
        `;
      });
    }

    // --- JUMPING & NAVIGATION CONTROLS ---
    function prevSlide() {
      if (currentSlideIndex > 0) {
        currentSlideIndex--;
        ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear chalkboard
        renderCurrentSlide();
      } else {
        showNotification("You are on the first slide!", "info");
      }
    }

    function nextSlide() {
      if (currentSlideIndex < slidesData.length - 1) {
        currentSlideIndex++;
        ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear chalkboard
        renderCurrentSlide();
      } else {
        showNotification("You reached the end of the lesson!", "info");
      }
    }

    function jumpToSlide(index) {
      if (index >= 0 && index < slidesData.length) {
        currentSlideIndex = index;
        ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear chalkboard
        renderCurrentSlide();
      }
    }

    // Key Listeners (Left/Right Arrows)
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") prevSlide();
      if (e.key === "ArrowRight") nextSlide();
    });

    // Fullscreen Mode Controller with custom Toast system (Replaces browser alert)
    function toggleFullscreen() {
      const elem = document.documentElement;
      if (!document.fullscreenElement) {
        elem.requestFullscreen().then(() => {
          showNotification("Entered Fullscreen mode.", "info");
        }).catch(err => {
          showNotification(`Fullscreen denied: ${err.message || 'Environment restricted inside iframe'}`, 'error');
        });
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen().then(() => {
            showNotification("Exited Fullscreen mode.", "info");
          }).catch(err => {
            showNotification(`Exit fullscreen error: ${err.message}`, 'error');
          });
        }
      }
    }

    // --- APPLICATION STARTUP SEQUENCE ---
    window.onload = () => {
      initCanvas();
      renderCurrentSlide();
      showNotification("Welcome to Ami Connect back together lesson!", "success");
    };
  </script>
</body>
</html>
